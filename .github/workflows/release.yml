name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip

    steps:
      - name: Checkout hx_agentic_sdk
        uses: actions/checkout@v4
        with:
          path: hx_agentic_sdk

      - name: Checkout hx_labs (sibling)
        uses: actions/checkout@v4
        with:
          repository: hawcx/hx_labs
          token: ${{ secrets.HX_LABS_READ_TOKEN }}
          path: hx_labs
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Copy Cross.toml to hx_labs working directory
        if: matrix.cross
        run: cp hx_agentic_sdk/Cross.toml hx_labs/Cross.toml
        shell: bash

      - name: Build hx_labs binaries
        working-directory: hx_labs
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }} \
              --bin haap-authenticator \
              --bin haap-tqs-precompute \
              --bin haap-tqs-jit \
              --bin haap-assembler \
              --bin haap-supervisor
          else
            cargo build --release --target ${{ matrix.target }} \
              --bin haap-authenticator \
              --bin haap-tqs-precompute \
              --bin haap-tqs-jit \
              --bin haap-assembler \
              --bin haap-supervisor
          fi
        shell: bash

      - name: Stage hx_labs inside SDK workspace for cross visibility
        if: matrix.cross
        shell: bash
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          
          echo "=== Filesystem layout ==="
          pwd
          ls -la
          
          echo "=== Existing path-deps in SDK (before staging) ==="
          grep -rn 'path.*hx_labs' hx_agentic_sdk/Cargo.toml \
              hx_agentic_sdk/crates/*/Cargo.toml 2>/dev/null || \
              echo "(no path-deps to hx_labs found)"
          
          echo "=== Copying hx_labs into SDK workspace ==="
          cp -r hx_labs hx_agentic_sdk/_hx_labs_vendored
          
          echo "=== Rewriting path-deps with sed ==="
          find hx_agentic_sdk -name 'Cargo.toml' \
              -not -path '*/_hx_labs_vendored/*' -exec \
              sed -i.bak -E 's|path[[:space:]]*=[[:space:]]*"(\.\./)+hx_labs/|path = "_hx_labs_vendored/|g' {} \;
          
          echo "=== Path-deps after rewriting (expect _hx_labs_vendored references) ==="
          grep -rn 'path.*_hx_labs_vendored' hx_agentic_sdk/Cargo.toml \
              hx_agentic_sdk/crates/*/Cargo.toml 2>/dev/null || \
              echo "(no rewritten path-deps found; investigate)"
          
          echo "=== Remaining ../hx_labs references (should be none) ==="
          if grep -rn 'path.*\.\./hx_labs' hx_agentic_sdk/Cargo.toml \
              hx_agentic_sdk/crates/*/Cargo.toml 2>/dev/null; then
              echo "WARNING: residual ../hx_labs references found above"
              exit 1
          else
              echo "(no remaining ../hx_labs references; good)"
          fi
          
          echo "=== Staging complete ==="

      - name: Build SDK binaries
        working-directory: hx_agentic_sdk
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }} \
              --bin haap-rsv --bin haap-sdk
          else
            cargo build --release --target ${{ matrix.target }} \
              --bin haap-rsv --bin haap-sdk
          fi
        shell: bash

      - name: Package distribution tarball
        shell: bash
        run: |
          mkdir -p dist
          OUT="hx-agent-sdk-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$OUT/bin"
          # hx_labs binaries
          for b in haap-authenticator haap-tqs-precompute haap-tqs-jit haap-assembler haap-supervisor; do
            cp "hx_labs/target/${{ matrix.target }}/release/$b" "$OUT/bin/" || \
              cp "hx_labs/target/${{ matrix.target }}/release/$b.exe" "$OUT/bin/"
          done
          # SDK binaries
          for b in haap-rsv haap-sdk; do
            cp "hx_agentic_sdk/target/${{ matrix.target }}/release/$b" "$OUT/bin/" || \
              cp "hx_agentic_sdk/target/${{ matrix.target }}/release/$b.exe" "$OUT/bin/"
          done
          cp hx_agentic_sdk/README.md "$OUT/"
          cp -r hx_agentic_sdk/docs "$OUT/"
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            7z a "dist/$OUT.zip" "$OUT"
          else
            tar -czf "dist/$OUT.tar.gz" "$OUT"
          fi

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: hx-agent-sdk-${{ matrix.target }}
          path: dist/*

  docker:
    name: docker multi-arch
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout hx_agentic_sdk
        uses: actions/checkout@v4
        with:
          path: hx_agentic_sdk

      - name: Checkout hx_labs (sibling)
        uses: actions/checkout@v4
        with:
          repository: hawcx/hx_labs
          token: ${{ secrets.HX_LABS_READ_TOKEN }}
          path: hx_labs
          ref: main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: hx_agentic_sdk/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/hawcx/hx-agent-sdk:${{ github.ref_name }}
            ghcr.io/hawcx/hx-agent-sdk:latest
